<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>사용하지 않는 포트폴리오 경로</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #182033;
        background: #f6f8fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      main {
        width: min(100%, 720px);
        border: 1px solid #dce2ec;
        border-radius: 8px;
        background: #ffffff;
        padding: clamp(1.5rem, 5vw, 3rem);
        box-shadow: 0 20px 50px rgba(24, 32, 51, 0.12);
      }

      p:first-child {
        margin: 0 0 0.5rem;
        color: #087f7a;
        font-size: 0.78rem;
        font-weight: 850;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
        line-height: 1.12;
        letter-spacing: 0;
      }

      p {
        color: #616b7f;
        line-height: 1.75;
      }

      a {
        display: inline-flex;
        min-height: 2.75rem;
        align-items: center;
        justify-content: center;
        margin-top: 0.75rem;
        border-radius: 7px;
        background: #2563eb;
        color: #ffffff;
        padding: 0.55rem 0.95rem;
        font-weight: 850;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Retired Route</p>
      <h1>portfolio.mintcocoa.cc는 더 이상 사용하지 않습니다.</h1>
      <p>
        상세 포트폴리오 문서는 GitHub Pages 경로로 정리했습니다.
        서버, 클라이언트, DevOps, Ops Dashboard 문서는 아래 경로에서 확인할 수 있습니다.
      </p>
      <a href="https://mint-cocoa.github.io/portfolio/">상세 포트폴리오 열기</a>
    </main>
  </body>
</html>
