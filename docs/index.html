<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>배진후 - 포트폴리오</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 720px;
      width: 100%;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 2.5rem;
      font-size: 1.1rem;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    a.card {
      display: block;
      padding: 1.5rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    a.card:hover {
      border-color: #60a5fa;
      transform: translateY(-2px);
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 0.4rem;
    }
    .card-desc {
      color: #94a3b8;
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .tags {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .tag {
      font-size: 0.75rem;
      padding: 0.2rem 0.6rem;
      background: #334155;
      border-radius: 4px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>배진후</h1>
    <p class="subtitle">게임 서버 / 클라이언트 개발 포트폴리오</p>
    <div class="cards">
      <a class="card" href="server/ServerCorePortfolio.html">
        <div class="card-title">서버 구현 포트폴리오</div>
        <div class="card-desc">io_uring 기반 C++ 게임 서버 라이브러리 및 데모 멀티플레이 서버</div>
        <div class="tags">
          <span class="tag">C++</span>
          <span class="tag">io_uring</span>
          <span class="tag">Linux</span>
          <span class="tag">Game Server</span>
        </div>
      </a>
      <a class="card" href="client/ClientPortfolio.html">
        <div class="card-title">클라이언트 구현 포트폴리오</div>
        <div class="card-desc">C++ DirectX 11 멀티플레이 던전 RPG 클라이언트</div>
        <div class="tags">
          <span class="tag">C++</span>
          <span class="tag">DirectX 11</span>
          <span class="tag">RPG</span>
          <span class="tag">Multiplayer</span>
        </div>
      </a>
    </div>
  </div>
</body>
</html>
